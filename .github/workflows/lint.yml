name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-pip
          pip install --break-system-packages pyflakes

      - name: Check syntax with pyflakes
        run: |
          pyflakes niruvi/ --exclude=__pycache__ 2>&1 | grep -v "unused import" || true

      - name: Compile all Python files
        run: |
          python3 -c "
          import py_compile, glob
          for f in sorted(glob.glob('niruvi/**/*.py', recursive=True)):
              if '__pycache__' not in f and '.egg-info' not in f:
                  py_compile.compile(f, doraise=True)
          print('All files compile clean')
          "

      - name: Validate desktop file
        run: |
          if command -v desktop-file-validate &>/dev/null; then
            desktop-file-validate asset/niruvi.desktop
          fi

      - name: Check for secrets in code
        run: |
          ! grep -r --include="*.py" --include="*.sh" -n \
            "password\|secret\|api_key\|api\.key\|token\|auth_token" \
            --exclude-dir=.git --exclude-dir=__pycache__ . | \
            grep -v "\.gitignore\|example\|placeholder\|TODO\|FIXME" | \
            grep -i "="

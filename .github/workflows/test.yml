name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pyqt6 libqt6widgets6 \
            squashfs-tools librsvg2-bin

      - name: Install Python dependencies
        run: |
          pip install --break-system-packages -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify all modules import
        run: |
          python -c "
          import niruvi
          from niruvi.main import main
          from niruvi.ui.manager import AppManager
          from niruvi.build.page import BuildWorker
          from niruvi.core.signing import list_secret_keys
          from niruvi.desktop.installation_registry import InstallationRegistry
          from niruvi.app.health_check import check_system_compatibility
          from niruvi.utils import get_icon
          from niruvi.utils.sound_manager import play as play_sound
          print('All module imports OK')
          "
